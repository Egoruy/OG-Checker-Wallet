<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenGradient | Onchain Checker</title>
    
    <!-- ПОДКЛЮЧЕНИЕ BRAND SKILL -->
    <script src="https://cdn.jsdelivr.net/gh/golldyck/opengradient-brand-skill@main/og-skill.js"></script>

    <style>
        /* Дополнительные корректировки для специфики чекера */
        .og-scope { min-height: 100vh; padding-bottom: 80px; }
        
        /* Стили для кольца счета (адаптация под бренд) */
        .score-ring { position: relative; width: 110px; height: 110px; flex-shrink: 0; }
        .score-ring svg { transform: rotate(-90deg); }
        .score-num {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .score-num .num { font-size: 30px; font-weight: 700; line-height: 1; }
        .score-num .grade { font-size: 12px; font-weight: 500; margin-top: 3px; opacity: 0.8; }

        .metric-card { transition: transform 0.2s ease; }
        .metric-card:hover { transform: translateY(-4px); }

        /* Кастомный прогресс-бар внутри карточек */
        .custom-bar-bg { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin: 10px 0; overflow: hidden; }
        .custom-bar-fill { height: 100%; border-radius: 2px; transition: width 1s ease; }

        .chain-chip {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 12px; border: 1px solid var(--og-primary-800);
            border-radius: 20px; font-size: 12px; cursor: pointer;
            background: var(--og-secondary-800); color: var(--og-primary-200);
            transition: all 0.2s; margin-right: 5px; margin-bottom: 5px;
        }
        .chain-chip.active { background: var(--og-primary-500); color: #000; border-color: var(--og-primary-500); font-weight: 600; }
        
        #results { margin-top: 30px; }
        
        .modal-overlay { 
            display: none; position: fixed; inset: 0; 
            background: rgba(10, 15, 25, 0.9); backdrop-filter: blur(4px);
            z-index: 1000; align-items: center; justify-content: center; 
        }
        .modal-overlay.open { display: flex; }
    </style>
</head>
<body class="og-scope">

    <!-- НАВИГАЦИЯ -->
    <nav class="og-nav">
        <div class="og-container" style="display: flex; justify-content: space-between; align-items: center; height: 100%;">
            <div style="width: 180px; cursor: pointer;" data-og-logo="wordmark" onclick="resetPage()"></div>
            <div style="display: flex; gap: 10px;">
                <span class="og-badge og-badge-primary">TEE Verified</span>
                <span class="og-badge">Mainnet</span>
            </div>
        </div>
    </nav>

    <div class="og-container" style="padding-top: 120px;">
        <!-- HERO -->
        <div style="text-align: center; margin-bottom: 40px;">
            <h1 class="og-h1 og-text-gradient">On-chain Credit Scoring</h1>
            <p class="og-body" style="opacity: 0.8;">Verified by OpenGradient AI Inference Engine</p>
        </div>

        <!-- ПОЛЕ ВВОДА -->
        <div class="og-card-glow" style="max-width: 800px; margin: 0 auto; padding: 30px;">
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <input type="text" id="address" class="og-input" style="flex: 1;" placeholder="Enter EVM (0x...) or Solana address" oninput="onAddressInput()">
                <button class="og-btn og-btn-primary" id="analyzeBtn" onclick="analyze()">Analyze ↗</button>
            </div>
            
            <div class="og-label" style="margin-bottom: 10px; color: var(--og-primary-400);">Target Networks</div>
            <div id="chainsRow" style="display: flex; flex-wrap: wrap; align-items: center;">
                <!-- Solana Badge (hidden by default) -->
                <div id="solana-chip" class="chain-chip" style="display:none; border-color: #14f195; color: #14f195;">
                    Solana
                </div>
                <!-- Кнопка добавления -->
                <button class="og-btn og-btn-secondary" style="padding: 4px 12px; font-size: 12px; height: auto;" onclick="openAddChain()">+ Add Chain</button>
            </div>
        </div>

        <!-- СТАТУС -->
        <div id="statusBar" style="display:none; text-align: center; margin: 20px 0;">
            <div class="og-text-primary">⚡ Processing TEE Verification...</div>
        </div>
        <div id="errorBar" class="og-card" style="display:none; border-color: var(--og-red); color: #ff8080; margin: 20px 0; text-align: center;"></div>

        <!-- РЕЗУЛЬТАТЫ -->
        <div id="results" style="display:none;">
            <!-- Основная карточка счета -->
            <div class="og-card-featured" id="scoreCard" style="display: flex; gap: 30px; align-items: center; margin-bottom: 20px; padding: 40px;">
                <!-- Сюда вставится контент через JS -->
            </div>

            <!-- Сетка метрик -->
            <div class="og-grid og-grid-3" id="metricsGrid">
                <!-- Сюда вставятся метрики -->
            </div>
            
            <!-- Доп инфо -->
            <div class="og-card" style="margin-top: 20px;">
                <h4 class="og-h4 og-text-primary">Summary Details</h4>
                <div id="summaryBar" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-top: 15px;">
                    <!-- Сюда вставится сводка -->
                </div>
            </div>
        </div>
    </div>

    <!-- ФУТЕР -->
    <footer style="margin-top: 60px; padding: 40px 0; border-top: 1px solid var(--og-secondary-800); text-align: center;">
        <div class="og-container">
            <div style="width: 120px; margin: 0 auto 15px;" data-og-logo="mark"></div>
            <p class="og-caption">Powered by <b>OpenGradient TEE</b> • Built by <b>Egoruy</b></p>
        </div>
    </footer>

    <!-- МОДАЛКА -->
    <div class="modal-overlay" id="addChainModal">
        <div class="og-card" style="width: 400px;">
            <h3 class="og-h3">Add Network</h3>
            <div style="margin-top: 15px;">
                <label class="og-label">Name</label>
                <input type="text" id="newChainName" class="og-input" placeholder="e.g. Avalanche">
                
                <label class="og-label" style="margin-top: 15px; display: block;">API URL</label>
                <input type="text" id="newChainUrl" class="og-input" placeholder="https://api.etherscan.io/api">
                
                <label class="og-label" style="margin-top: 15px; display: block;">API Key</label>
                <input type="text" id="newChainKey" class="og-input" placeholder="Your key">
            </div>
            <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px;">
                <button class="og-btn" onclick="closeAddChain()">Cancel</button>
                <button class="og-btn og-btn-primary" onclick="saveChain()">Add</button>
            </div>
        </div>
    </div>

    <script>
        let chains = [];
        let selectedChains = new Set();

        function resetPage() {
            location.reload();
        }

        // Загрузка сетей при старте
        async function loadChains() {
            try {
                const res = await fetch('/api/chains');
                const data = await res.json();
                chains = data.chains;
                selectedChains = new Set(chains.filter(c => !c.custom).map(c => String(c.id)));
                renderChains();
            } catch(e) { console.error("API error", e); }
        }

        function isSolanaAddress(addr) {
            return !addr.startsWith('0x') && addr.length >= 32 && addr.length <= 44 && /^[1-9A-HJ-NP-Za-km-z]+$/.test(addr);
        }

        function onAddressInput() {
            const addr = document.getElementById('address').value.trim();
            const solChip = document.getElementById('solana-chip');
            if (isSolanaAddress(addr)) {
                solChip.style.display = 'inline-flex';
                selectedChains = new Set(['solana']);
            } else {
                solChip.style.display = 'none';
                if (selectedChains.has('solana')) {
                    selectedChains = new Set(chains.filter(c => !c.custom).map(c => String(c.id)));
                }
            }
            renderChains();
        }

        function renderChains() {
            const row = document.getElementById('chainsRow');
            const solChip = document.getElementById('solana-chip');
            const addBtn = row.querySelector('button');
            
            // Очищаем, кроме кнопки и соланы
            Array.from(row.querySelectorAll('.chain-chip:not(#solana-chip)')).forEach(el => el.remove());

            chains.forEach(chain => {
                const id = String(chain.id);
                const chip = document.createElement('div');
                chip.className = 'chain-chip' + (selectedChains.has(id) ? ' active' : '');
                chip.innerHTML = `${chain.name}${chain.custom ? ` <span style="margin-left:5px;opacity:0.5">×</span>` : ''}`;
                chip.onclick = () => toggleChain(id);
                row.insertBefore(chip, addBtn);
            });
        }

        function toggleChain(id) {
            if (selectedChains.has(id)) selectedChains.delete(id);
            else selectedChains.add(id);
            renderChains();
        }

        function openAddChain() { document.getElementById('addChainModal').classList.add('open'); }
        function closeAddChain() { document.getElementById('addChainModal').classList.remove('open'); }

        async function saveChain() {
            const name = document.getElementById('newChainName').value.trim();
            const url = document.getElementById('newChainUrl').value.trim();
            const api_key = document.getElementById('newChainKey').value.trim();
            if (!name || !url || !api_key) return alert('Fill all fields');
            
            const res = await fetch('/api/chains', { 
                method: 'POST', 
                headers: {'Content-Type':'application/json'}, 
                body: JSON.stringify({name, url, api_key}) 
            });
            const data = await res.json();
            closeAddChain();
            await loadChains();
            selectedChains.add(String(data.id));
            renderChains();
        }

        function renderResults(data) {
            const circ = 2 * Math.PI * 46;
            const offset = circ - (data.score / 100) * circ;
            const brandColor = '#24bce3'; 

            // Главная карточка
            document.getElementById('scoreCard').innerHTML = `
                <div class="score-ring">
                    <svg width="110" height="110" viewBox="0 0 110 110">
                        <circle cx="55" cy="55" r="46" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="8"/>
                        <circle cx="55" cy="55" r="46" fill="none" stroke="${brandColor}" stroke-width="8"
                            stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${offset.toFixed(2)}" stroke-linecap="round"/>
                    </svg>
                    <div class="score-num">
                        <div class="num og-text-primary">${data.score}</div>
                        <div class="grade">${data.grade}</div>
                    </div>
                </div>
                <div style="flex: 1;">
                    <h2 class="og-h2" style="margin-bottom: 5px;">Analysis Result</h2>
                    <p class="og-caption" style="font-family:monospace; margin-bottom: 15px; opacity: 0.6;">${data.address}</p>
                    <p class="og-body">${data.summary}</p>
                    <div style="margin-top: 15px;">
                        <a href="https://explorer.opengradient.ai/tx/${data.payment_hash}" target="_blank" class="og-badge og-badge-primary" style="text-decoration:none">
                            ✓ Verifiable on OpenGradient
                        </a>
                    </div>
                </div>
            `;

            // Метрики
            const metricsGrid = document.getElementById('metricsGrid');
            metricsGrid.innerHTML = '';
            Object.entries(data.metrics || {}).forEach(([key, m]) => {
                const card = document.createElement('div');
                card.className = 'og-card metric-card';
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                        <div class="og-label">${m.label}</div>
                        <div class="og-text-primary" style="font-weight:700;">${m.score}</div>
                    </div>
                    <div class="custom-bar-bg">
                        <div class="custom-bar-fill" style="width:${m.score}%; background:${brandColor}"></div>
                    </div>
                    <p class="og-caption">${m.detail}</p>
                `;
                metricsGrid.appendChild(card);
            });

            // Сводка
            const chainsOk = (data.chains_data || []).filter(c => !c.error).length;
            document.getElementById('summaryBar').innerHTML = `
                <div><div class="og-label">Scanned Networks</div><div class="og-text-primary">${chainsOk} Chains</div></div>
                <div><div class="og-label">Total Transactions</div><div class="og-body">${data.total_txs || 0}</div></div>
                <div><div class="og-label">AI Verdict</div><div class="og-body">${data.grade}</div></div>
                <div><div class="og-label">Execution Cost</div><div class="og-text-primary">~0.09 OPG</div></div>
            `;

            document.getElementById('results').style.display = 'block';
            if (window.OGBrand) OGBrand.initScrollReveal();
        }

        async function analyze() {
            const address = document.getElementById('address').value.trim();
            if (!address) return;

            document.getElementById('errorBar').style.display = 'none';
            document.getElementById('results').style.display = 'none';
            document.getElementById('statusBar').style.display = 'block';
            document.getElementById('analyzeBtn').disabled = true;

            try {
                const res = await fetch('/api/score', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ address, chains: Array.from(selectedChains) })
                });
                const json = await res.json();
                
                if (json.error) {
                    showError(json.error);
                } else {
                    renderResults(json.result);
                }
            } catch (e) {
                showError("Connection failed");
            } finally {
                document.getElementById('statusBar').style.display = 'none';
                document.getElementById('analyzeBtn').disabled = false;
            }
        }

        function showError(msg) {
            const bar = document.getElementById('errorBar');
            bar.textContent = msg;
            bar.style.display = 'block';
        }

        // Enter key support
        document.getElementById('address').addEventListener('keydown', e => { if (e.key === 'Enter') analyze(); });
        
        loadChains();
    </script>
</body>
</html>
